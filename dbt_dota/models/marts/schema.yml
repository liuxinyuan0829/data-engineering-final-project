version: 2

models:
  - name: dim_leagues
    description: >
      Dimension model for league information. This model contains distinct leagues
      with their tier classifications, deduplicated from the staging layer.
    columns:
      - name: league_id
        description: Unique identifier for the league
        data_tests:
          - unique
          - not_null
      - name: league_name
        description: Name of the league
        data_tests:
          - not_null
      - name: tier
        description: Tier classification of the league (e.g., Premium, Professional, Amateur)
        data_tests:
          - not_null

  - name: fact_main_metadata
    description: >
      Fact model for match metrics and outcomes. This model combines main match metadata
      with league dimensions, providing a comprehensive view of match statistics. Materialized
      as an incremental table, updated with new matches based on start_datetime.
    columns:
      - name: version
        description: Patch version in which the match was played
      - name: match_id
        description: Unique identifier for the match (incremental unique key)
        data_tests:
          - unique
          - not_null
      - name: league_id
        description: Foreign key to the dim_leagues dimension table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_leagues')
                field: league_id
      - name: start_datetime
        description: Timestamp when the match started
        data_tests:
          - not_null
      - name: start_date
        description: Date when the match started (without time component)
        data_tests:
          - not_null
      - name: duration
        description: Match duration in seconds
      - name: first_blood_time
        description: Time in seconds when the first blood kill occurred
      - name: radiant_win
        description: Indicator of whether the Radiant team won the match
      - name: radiant_score
        description: Final kill count for the Radiant team
      - name: dire_score
        description: Final kill count for the Dire team
      - name: league_name
        description: Name of the league (denormalized from dim_leagues)
        data_tests:
          - not_null
      - name: tier
        description: Tier classification of the league (denormalized from dim_leagues)
        data_tests:
          - not_null
